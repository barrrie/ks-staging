# Builds the 11ty site and publishes _site to GitHub Pages.
# In the production repo (kind-stranger-website), only runs on main —
# merging the redesign branch is the "publish" action.
# In any other repo (the staging repo), it builds with a path prefix,
# strips the CNAME, and noindexes everything.
# NOTE: before first deploy, set Pages source to "GitHub Actions" in repo Settings → Pages.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Build (production or staging)
        run: |
          if [ "${{ github.repository }}" = "barrrie/kind-stranger-website" ]; then
            npx eleventy
          else
            KS_STAGING=1 npx eleventy --pathprefix="/${{ github.event.repository.name }}/"
            rm -f _site/CNAME
            printf 'User-agent: *\nDisallow: /\n' > _site/robots.txt
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
